services:
  - type: web
    name: estate-api
    env: node
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: <your-mongodb-connection-string>
      - key: JWT_SECRET_KEY
        value: <your-jwt-secret>
      - key: CLIENT_ORIGIN
        value: https://estate-client.onrender.com
      - key: RAZORPAY_KEY_ID
        value: <your-razorpay-key-id>
      - key: RAZORPAY_KEY_SECRET
        value: <your-razorpay-key-secret>
    autoDeploy: true
    repo: https://github.com/<your-username>/<your-repo-name>

  - type: web
    name: estate-client
    env: static
    region: oregon
    buildCommand: npm install && npm run build
    staticPublish: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://estate-api.onrender.com/api
      - key: VITE_SOCKET_URL
        value: https://estate-socket.onrender.com
      - key: VITE_RAZORPAY_KEY_ID
        value: <your-razorpay-key-id>
      - key: VITE_CLOUDINARY_CLOUD_NAME
        value: dci28nvyx
      - key: VITE_CLOUDINARY_UPLOAD_PRESET
        value: estate
    autoDeploy: true
    repo: https://github.com/<your-username>/<your-repo-name>

  - type: web
    name: estate-socket
    env: node
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
    autoDeploy: true
    repo: https://github.com/<your-username>/<your-repo-name>